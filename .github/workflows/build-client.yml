name: Build Windows Client

on:
  push:
    tags:
      - 'v*'  # Trigger khi push tag v1.0.0, v1.0.1, ...

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: client/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r client/requirements.txt
          pip install Pillow

      - name: Write version file
        shell: bash
        run: |
          echo "${{ github.ref_name }}" > client/src/VERSION

      - name: Generate app icon
        run: |
          python client/scripts/gen_icon.py

      - name: Download VC++ Redistributable 2015-2022
        run: |
          New-Item -ItemType Directory -Force -Path client/redist
          Write-Host "Downloading VC++ Redistributable x64..."
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "client/redist/vc_redist.x64.exe"
          $size = (Get-Item "client/redist/vc_redist.x64.exe").Length
          Write-Host "Downloaded: vc_redist.x64.exe ($([math]::Round($size/1MB, 1)) MB)"
          if ($size -lt 10MB) {
            Write-Error "vc_redist.x64.exe too small, download may have failed"
            exit 1
          }

      - name: Collect VC++ Runtime DLLs
        shell: python
        run: |
          import sys, os, glob, shutil

          python_dir = os.path.dirname(sys.executable)
          out_dir = os.path.join('client', 'bundled_dlls')
          os.makedirs(out_dir, exist_ok=True)

          dll_names = [
              'vcruntime140.dll',
              'vcruntime140_1.dll',
              'msvcp140.dll',
              'msvcp140_1.dll',
              'python312.dll',
              'ucrtbase.dll',
              'concrt140.dll',
          ]

          search_dirs = [
              python_dir,
              os.path.join(python_dir, 'DLLs'),
              os.path.join(python_dir, 'Library', 'bin'),
              os.path.join(os.environ.get('SystemRoot', r'C:\Windows'), 'System32'),
          ]

          for p in os.environ.get('PATH', '').split(os.pathsep):
              if p and os.path.isdir(p):
                  search_dirs.append(p)

          found = set()
          for dll_name in dll_names:
              for d in search_dirs:
                  src = os.path.join(d, dll_name)
                  if os.path.exists(src) and dll_name not in found:
                      dst = os.path.join(out_dir, dll_name)
                      shutil.copy2(src, dst)
                      size = os.path.getsize(dst)
                      print(f"  Copied: {dll_name} from {d} ({size:,} bytes)")
                      found.add(dll_name)
                      break

          print(f"\n  Total DLLs collected: {len(found)}")
          for dll in ['vcruntime140.dll', 'python312.dll']:
              if dll not in found:
                  print(f"  CRITICAL: {dll} NOT FOUND!")
                  sys.exit(1)

      - name: Build with PyInstaller
        run: |
          cd client
          pyinstaller --noconfirm build.spec

      - name: Verify PyInstaller output
        run: |
          $exe = "client/dist/RealSearch.exe"
          if (Test-Path $exe) {
            $size = (Get-Item $exe).Length
            Write-Host "Build OK: RealSearch.exe ($([math]::Round($size/1MB, 1)) MB)"
            if ($size -lt 10MB) {
              Write-Error "ERROR: Exe too small ($size bytes) - build may be broken!"
              exit 1
            }
          } else {
            Write-Error "ERROR: RealSearch.exe not found!"
            exit 1
          }

      - name: Build Installer with Inno Setup
        run: |
          # Extract version number (remove 'v' prefix)
          $version = "${{ github.ref_name }}" -replace "^v", ""
          Write-Host "Building installer for version: $version"

          # Inno Setup is pre-installed on windows-latest
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$version "client\installer.iss"

          $setup = "client\Output\RealSearchSetup.exe"
          if (Test-Path $setup) {
            $size = (Get-Item $setup).Length
            Write-Host "Installer OK: RealSearchSetup.exe ($([math]::Round($size/1MB, 1)) MB)"
          } else {
            Write-Error "ERROR: RealSearchSetup.exe not found!"
            exit 1
          }

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Real SEO ${{ github.ref_name }}"
          body: |
            ## Real SEO ${{ github.ref_name }}

            ### Cài đặt (Khuyến nghị)
            1. Tải file **`RealSearchSetup.exe`** bên dưới
            2. Chạy bộ cài, VC++ Runtime sẽ được cài tự động nếu cần
            3. App sẽ tự động tải trình duyệt Chromium (~150MB) lần đầu
            4. Đăng nhập bằng tài khoản RealSearch

            ### Tải bản portable (không cần cài đặt)
            - Tải `RealSearch.exe` nếu bạn đã cài VC++ Runtime rồi
            - Nếu gặp lỗi **"Failed to load Python DLL"**: dùng bản `RealSearchSetup.exe` ở trên

            ### Lưu ý
            - App sẽ tự động cập nhật khi có bản mới
            - Nếu Windows SmartScreen chặn, chọn "More info" → "Run anyway"
            - Nếu Antivirus chặn, thêm thư mục `%APPDATA%\RealSearch` vào exclusion
          files: |
            client/dist/RealSearch.exe
            client/Output/RealSearchSetup.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
